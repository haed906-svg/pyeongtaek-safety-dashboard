<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호우 사전안전점검 0619</title>
<style>
  :root {
    --lg-red: #A50034;
    --lg-gray: #6B6B6B;
    --light-bg: #F7F7F7;
    --line: #DDDDDD;
    --dark-gray: #444444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;
    background: var(--light-bg);
    color: var(--dark-gray);
    padding: 0 0 24px;
  }
  .header {
    background: var(--lg-red);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .date-badge {
    background: rgba(255,255,255,0.85);
    color: var(--lg-red);
    font-weight: 700;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .wrap {
    max-width: 1180px;
    margin: 16px auto 0;
    padding: 0 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 820px) {
    .wrap { grid-template-columns: 1fr; }
  }
  .panel {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .panel-head {
    background: var(--lg-red);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 9px 14px;
  }
  .panel-body { padding: 14px; }
  .wx-img {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    display: block;
  }
  .wx-note {
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .wx-note b { color: var(--lg-red); }
  .link-btn {
    display: block;
    margin-top: 4px;
    background: var(--lg-red);
    color: #fff;
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    padding: 12px;
    border-radius: 6px;
    text-decoration: none;
  }
  .link-btn:active { opacity: 0.85; }
  .cat {
    background: var(--lg-gray);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 7px 12px;
    border-radius: 5px;
    margin: 12px 0 8px;
  }
  .cat:first-child { margin-top: 0; }
  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 4px;
    font-size: 14px;
  }
  .chk {
    width: 18px; height: 18px;
    border: 1.5px solid var(--lg-gray);
    border-radius: 3px;
    flex: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    user-select: none;
  }
  .chk.done { background: var(--lg-red); border-color: var(--lg-red); }
  .footer {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-top: 18px;
  }
</style>
</head>

<script>
  const sections = [
    { title: "① 배수시설", items: [
      "배수로·우수로 퇴적물 및 막힘 여부",
      "집수정(맨홀) 내부 청소 상태",
      "배수펌프 자동 운전 정상 작동 여부",
      "역류방지시설 이상 유무" ] },
    { title: "② 건물 외부", items: [
      "옥상 우수관·드레인 막힘 및 적치물",
      "지하 출입구·방수 상태 확인",
      "전기실·발전기실 침수 위험 여부" ] },
    { title: "③ 취약지역", items: [
      "지하층·반지하 시설 침수 위험",
      "공사장 토사 유실·사면 붕괴 위험",
      "위험물 저장소 이상 유무" ] },
    { title: "④ 비상대응 준비", items: [
      "양수기·수중펌프·모래주머니 확보",
      "기상특보 수신 체계 확인",
      "비상연락망 최신화 및 비상근무 체계" ] }
  ];
  const root = document.getElementById('checklist');
  sections.forEach(sec => {
    const c = document.createElement('div');
    c.className = 'cat';
    c.textContent = sec.title;
    root.appendChild(c);
    sec.items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'item';
      const box = document.createElement('span');
      box.className = 'chk';
      box.onclick = () => { box.classList.toggle('done'); box.textContent = box.classList.contains('done') ? '\u2713' : ''; };
      const t = document.createElement('span');
      t.textContent = it;
      row.appendChild(box);
      row.appendChild(t);
      root.appendChild(row);
    });
  });
</script>
